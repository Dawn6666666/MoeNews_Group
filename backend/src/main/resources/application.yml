server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: moenews-backend

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/moenews?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 114514

  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

mybatis-plus:
  configuration:
    map-underline-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

moenews:
  jwt:
    secret: moenewsSecretKey1234567890abcdefghijklmnopqrstuvwxyz
    expire: 86400
  upload:
    path: D:/Code/IDEA/MoeNews/uploads/
